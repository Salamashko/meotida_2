<!-- @dsCard group="Brand" viewport="700x180" name="Logo" subtitle="ГК Миллениум mountain mark, white plate" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:24px;display:flex;gap:24px;align-items:center;background:linear-gradient(135deg,#fff,#eef8fc)}
  .plate{background:#fff;border-radius:16px;padding:9px;border:1px solid var(--line);box-shadow:var(--shadow-card)}
  .plate img{width:128px;height:auto;display:block}
  .meta{font-size:13px;color:var(--muted);line-height:1.5}
  .meta b{color:var(--text)}
</style></head>
<body>
  <div class="plate"><img src="../assets/logo-millenium.png" alt="ГК Миллениум"></div>
  <div class="meta">
    <b>Группа компаний Миллениум</b><br>
    Mountain "М" mark — red &amp; yellow on black wordmark.<br>
    Always on a white rounded plate (16px), padded, with a hairline border.
  </div>
</body></html>
