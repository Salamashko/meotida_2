<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:120px;border-radius:16px;padding:14px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line)}
  .n{font-weight:800;font-size:13px} .h{font-family:var(--font-mono);font-size:12px;opacity:.85}
</style></head>
<body>
  <div class="sw" style="background:var(--accent);color:#fff"><span class="n">accent</span><span class="h">#0086bb</span></div>
  <div class="sw" style="background:var(--accent-dark);color:#fff"><span class="n">accent-dark</span><span class="h">#006e99</span></div>
  <div class="sw" style="background:var(--brand-red);color:#fff"><span class="n">brand-red</span><span class="h">#d8232a</span></div>
  <div class="sw" style="background:var(--brand-yellow);color:#3a2a00"><span class="n">brand-yellow</span><span class="h">#f2c511</span></div>
</body></html>
