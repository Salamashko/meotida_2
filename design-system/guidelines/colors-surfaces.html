<!-- @dsCard group="Colors" viewport="700x150" name="Surfaces & ink" subtitle="Backgrounds, lines, text" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:104px;border-radius:16px;padding:14px;height:96px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line)}
  .n{font-weight:800;font-size:13px} .h{font-family:var(--font-mono);font-size:12px;opacity:.85}
</style></head>
<body>
  <div class="sw" style="background:var(--bg)"><span class="n">bg</span><span class="h">#f3f8fa</span></div>
  <div class="sw" style="background:var(--soft)"><span class="n">soft</span><span class="h">#e7f0f3</span></div>
  <div class="sw" style="background:var(--card)"><span class="n">card</span><span class="h">#ffffff</span></div>
  <div class="sw" style="background:var(--text);color:#fff"><span class="n">text</span><span class="h">#17242a</span></div>
  <div class="sw" style="background:var(--muted);color:#fff"><span class="n">muted</span><span class="h">#60717a</span></div>
  <div class="sw" style="background:#fff;border-color:var(--line)"><span class="n">line</span><span class="h">#c7d9e0</span></div>
</body></html>
