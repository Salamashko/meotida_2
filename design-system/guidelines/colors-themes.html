<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:20px;display:flex;gap:14px;flex-wrap:wrap}
  .sw{flex:1;min-width:130px;border-radius:16px;padding:14px;height:104px;display:flex;flex-direction:column;justify-content:space-between;border:1px solid var(--line)}
  .n{font-weight:800;font-size:13px} .h{font-family:var(--font-mono);font-size:11px;opacity:.85}
  .t{font-size:11px;font-weight:700;opacity:.8}
</style></head>
<body>
  <div class="sw" style="background:#0f172a;color:#2ba8db"><span class="t" style="color:#94a8b8">Тёмная тема</span><div><span class="n">dark accent</span><br><span class="h">#2ba8db</span></div></div>
  <div class="sw" style="background:#f6f4fb;color:var(--simple-accent-dark)"><span class="t" style="color:#8b8b95">Простой режим</span><div><span class="n">sage accent</span><br><span class="h">#7fae9e</span></div></div>
  <div class="sw" style="background:var(--champ-bg);color:var(--champ-graphite);border-color:var(--champ-line)"><span class="t" style="color:var(--champ-gold)">Шампань · IT</span><div><span class="n">gold</span><br><span class="h">#b08d57</span></div></div>
  <div class="sw" style="background:#f5f3ff;color:var(--violet-dark)"><span class="t" style="color:#a78bfa">Переключатель</span><div><span class="n">violet</span><br><span class="h">#7c3aed</span></div></div>
</body></html>
