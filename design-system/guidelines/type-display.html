<!-- @dsCard group="Type" viewport="700x200" name="Display & headings" subtitle="Arial/Helvetica, tight tracking" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px}
  .h1{font-size:var(--fs-h1);letter-spacing:var(--ls-h1);line-height:var(--lh-tight);margin:0}
  .h2{font-size:var(--fs-h2);letter-spacing:var(--ls-heading);font-weight:800;margin:14px 0 0}
  .h3{font-size:var(--fs-h3);letter-spacing:var(--ls-heading);font-weight:800;margin:8px 0 0}
  .m{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px}
</style></head>
<body>
  <p class="h1">Заявка в IT отдел</p>
  <div class="m">h1 · clamp(26–46px) · -.03em · 1.05</div>
  <p class="h2">Что случилось</p>
  <div class="m">h2 · 23px · 800 · -.02em</div>
  <p class="h3">Файлы и скриншоты</p>
  <div class="m">h3 · 18px · 800 · -.02em</div>
</body></html>
