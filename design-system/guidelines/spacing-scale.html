<!-- @dsCard group="Spacing" viewport="700x140" name="Spacing scale" subtitle="4 · 8 · 12 · 14 · 20 · 26 · 42" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:22px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
  .col{display:flex;flex-direction:column;align-items:center;gap:6px}
  .bar{background:var(--accent);border-radius:4px;width:22px}
  .t{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
</style></head>
<body>
  <div class="col"><div class="bar" style="height:4px"></div><span class="t">4</span></div>
  <div class="col"><div class="bar" style="height:8px"></div><span class="t">8</span></div>
  <div class="col"><div class="bar" style="height:12px"></div><span class="t">12</span></div>
  <div class="col"><div class="bar" style="height:14px"></div><span class="t">14</span></div>
  <div class="col"><div class="bar" style="height:18px"></div><span class="t">18</span></div>
  <div class="col"><div class="bar" style="height:20px"></div><span class="t">20</span></div>
  <div class="col"><div class="bar" style="height:26px"></div><span class="t">26</span></div>
  <div class="col"><div class="bar" style="height:42px"></div><span class="t">42</span></div>
</body></html>
