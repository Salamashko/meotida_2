<!-- @dsCard group="Spacing" viewport="700x180" name="Shadows" subtitle="Soft floats, accent glow" -->
<!DOCTYPE html>
<html lang="ru"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;padding:30px;display:flex;gap:24px;flex-wrap:wrap;background:var(--bg)}
  .b{background:#fff;border:1px solid var(--line);border-radius:18px;width:150px;height:90px;display:flex;align-items:flex-end;padding:12px;font-family:var(--font-mono);font-size:11px;color:var(--muted)}
</style></head>
<body>
  <div class="b" style="box-shadow:var(--shadow-card)">shadow-card</div>
  <div class="b" style="box-shadow:var(--shadow)">shadow (card float)</div>
  <div class="b" style="box-shadow:var(--shadow-accent)">shadow-accent</div>
</body></html>
