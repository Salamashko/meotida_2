<!-- @startingPoint section="IT-request" subtitle="Full IT-request app screen" viewport="1280x900" -->
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Заявка в IT отдел — UI kit</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { min-height: 100vh; }
  .app { width: min(1280px, calc(100vw - 32px)); margin: 22px auto 42px; }
  main { margin-top: 18px; }
  .helpCard h3 { margin: 0 0 8px; font-size: 18px; letter-spacing: -.02em; }
  .helpCard li { margin: 6px 0; line-height: 1.5; }
</style>
</head>
<body>
<div class="app" id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="RequestForm.jsx"></script>
<script type="text/babel" src="ResultView.jsx"></script>
<script type="text/babel" src="WikiSearch.jsx"></script>
<script type="text/babel">
  const { Card } = window.DesignSystem_56ba0f;

  function HelpTab() {
    return (
      <Card className="helpCard">
        <h2 style={{ margin: "0 0 12px", fontSize: 23, letterSpacing: "-.02em" }}>Инструкция</h2>
        <ol style={{ margin: 0, paddingLeft: 20, color: "var(--text)" }}>
          <li>Выберите город, юрлицо и программу.</li>
          <li>Укажите проблему и срочность, опишите детали.</li>
          <li>Прикрепите скриншоты через Ctrl+V.</li>
          <li>Нажмите «Сформировать письмо» и перейдите на вкладку «Что получится».</li>
          <li>Скопируйте тему и текст — или откройте черновик в почте.</li>
        </ol>
      </Card>
    );
  }

  function App() {
    const [tab, setTab] = React.useState("formTab");
    const [mode, setMode] = React.useState("pro");
    const [theme, setTheme] = React.useState("light");
    const [state, setState] = React.useState({ city: "", org: "", program: "", contact: "", problem: "", urgency: "", desc: "" });
    const set = (k, v) => setState((s) => ({ ...s, [k]: v }));

    React.useEffect(() => {
      document.body.className = [theme === "dark" ? "theme-dark" : "", mode === "simple" ? "mode-simple" : ""].filter(Boolean).join(" ");
    }, [theme, mode]);

    const req = ["city", "org", "program", "problem", "urgency"];
    const progress = Math.round((req.filter((k) => state[k]).length / req.length) * 100);

    return (
      <React.Fragment>
        <Header tab={tab} setTab={setTab} mode={mode} setMode={setMode}
          theme={theme} toggleTheme={() => setTheme((t) => (t === "dark" ? "light" : "dark"))} progress={progress} />
        <main>
          {tab === "formTab" && <window.RequestForm state={state} set={set} onSubmit={() => setTab("resultTab")} />}
          {tab === "resultTab" && <window.ResultView state={state} />}
          {tab === "wikiTab" && <window.WikiSearch />}
          {tab === "helpTab" && <HelpTab />}
        </main>
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
