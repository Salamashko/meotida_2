<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; }
  .wrap { display: grid; gap: 14px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { Banner, ProgressBar, Toast } = window.DesignSystem_56ba0f;
  function Demo() {
    return (
      <div className="wrap">
        <Banner tone="info" icon="👇" title="Сначала загляните сюда">
          Возможно, проблема решается готовой инструкцией без обращения в IT.
        </Banner>
        <div className="row">
          <Banner tone="success" style={{ flex: 1 }}>Готово — заявка скопирована.</Banner>
          <Banner tone="warning" style={{ flex: 1 }}>Приложение само ничего не отправляет.</Banner>
        </div>
        <Banner tone="tip"><b>Для пользователя:</b> сначала заполните город, юрлицо и программу.</Banner>
        <ProgressBar value={60} />
        <div className="row">
          <Toast tone="ok">Тема письма скопирована</Toast>
          <Toast tone="err">Заполните город</Toast>
          <Toast tone="info">Черновик сохранён</Toast>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
