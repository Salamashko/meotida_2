<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
  .span { grid-column: 1 / -1; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
  const { TextField, Select, UrgencyPicker } = window.DesignSystem_56ba0f;
  function Demo() {
    const [u, setU] = React.useState("P2");
    return (
      <div className="wrap">
        <TextField label="ФИО и должность" placeholder="Иванов И.И., бухгалтер"
          hint="Если не указано в подписи письма." />
        <Select label="В какой программе проблема" required placeholder="Выберите программу"
          options={["1С8 Бухгалтерия", "Касса / ФН / ОФД", "ЭДО / Диадок", "ЭЦП", "Другое"]} />
        <div className="span">
          <TextField label="Описание проблемы" required multiline
            placeholder="Что именно не работает?"
            hint="Опишите детали и приложите скриншот." />
        </div>
        <div className="span">
          <label style={{ display: "block", margin: "0 0 0", fontWeight: 800, fontSize: 14 }}>Срочность *</label>
          <UrgencyPicker value={u} onChange={setU} />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
